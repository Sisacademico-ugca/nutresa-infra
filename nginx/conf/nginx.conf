# ============================================================
#  nginx.conf — srv-web Servicios Nutresa (VLAN 40 - DMZ)
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de log personalizado
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Ocultar versión de Nginx (seguridad)
    server_tokens off;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ─── Servidor principal ───────────────────────────────
    server {
        listen       80;
        server_name  nutresa.local;
        root         /usr/share/nginx/html;
        index        index.html;

        # Endpoint de health check (para Docker)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Sitio principal
        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy inverso hacia la API/backend (srv-db indirecto)
        location /api/ {
            proxy_pass         http://172.20.10.10:3000/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Páginas de error personalizadas
        error_page  404              /404.html;
        error_page  500 502 503 504  /50x.html;
    }
}
