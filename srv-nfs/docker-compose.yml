services:
  nfs-server:
    image: erichough/nfs-server
    container_name: srv-nfs-nutresa
    restart: always
    privileged: true
    volumes:
      - /mnt/nutresa_datos:/srv/nutresa_shared
    environment:
      - NFS_EXPORT_0=/srv/nutresa_shared  192.168.0.0/16(rw,sync,no_subtree_check,no_root_squash)
    ports:
      - "2049:2049"
    networks:
      nutresa_net:
        ipv4_address: 192.168.10.15

networks:
  nutresa_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
